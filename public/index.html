<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BouCloud | Enterprise Cloud Infrastructure</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
  
<link rel="stylesheet" href="/assets/css/index.css"/>

</head>
<body class="antialiased">

<main class="min-h-screen relative">
  <div class="page h-screen w-screen overflow-hidden flex flex-col items-center justify-center relative bg-sky-50">
  <style>
    :root {
      --bou-green: #10A500;
      --bou-blue: #0284C7;
      --sky-light: #F0F9FF;
      --sky-mid: #E0F2FE;
      --text-primary: #0F172A;
      --text-secondary: #334155;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background-color: var(--sky-light);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Particle Canvas Layer */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 5;
      pointer-events: none;
    }

    .aurora-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -5;
      background: radial-gradient(circle at 50% 50%, var(--sky-mid) 0%, var(--sky-light) 100%);
    }

    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background-image: url('/assets/img/section_1.png');
      background-size: cover;
      background-position: center;
      opacity: 0.55;
      filter: saturate(1.1) brightness(1.05);
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: rgba(240, 249, 255, 0.45);
    }

    .content-container {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 1150px;
      padding: 0 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: reveal 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-frame img {
      height: clamp(60px, 18vw, 190px);
      width: auto;

    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 0.95;
      color: var(--text-primary);
      margin-bottom: 2rem;
    }

    .coming-soon-tag {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5em;
      color: var(--bou-green);
      margin-bottom: 1.5rem;
    }

    p {
      color: var(--text-secondary);
      font-size: clamp(1.1rem, 2.5vw, 1.7rem);
      font-weight: 400;
      max-width: 850px;
      margin: 0 auto 0.5rem;
      line-height: 1.5;
      opacity: 0.9;
    }

    .registry-form {
      width: 100%;
      max-width: 620px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      padding: 12px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .registry-form:focus-within {
      box-shadow: 0 30px 80px rgba(16, 165, 0, 0.15);
      border-color: var(--bou-green);
      transform: scale(1.01);
    }

    input {
      background: transparent;
      border: none;
      flex: 1;
      padding: 1.25rem 2.5rem;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 1.15rem;
      outline: none;
      width: 100%;
    }

    input::placeholder {
      color: #94A3B8;
    }

    .btn-initialize {
      background: var(--text-primary);
      color: white;
      font-weight: 700;
      padding: 1.25rem 3rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      white-space: nowrap;
    }

    .btn-initialize:hover {
      background: var(--bou-green);
      transform: scale(1.02);
      box-shadow: 0 8px 25px rgba(16, 165, 0, 0.25);
    }

    .footer-mini {
      position: absolute;
      bottom: 3rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #94A3B8;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .footer-mini a {
      color: var(--bou-blue);
      text-decoration: none;
      font-weight: 800;
    }
  </style>

  <!-- Visual Foundation -->
  <div class="aurora-container"></div>
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <canvas id="particle-canvas"></canvas>

  <!-- Content -->
  <main class="content-container">
    <div class="logo-frame">
      <img src="/assets/img/boucloud_logo.jpeg" alt="BouCloud"/>
    </div>

    <div class="coming-soon-tag">Establishing Nodes 2026</div>

    <h1>The Sovereign Cloud <br/> <span class="text-bou-blue italic opacity-95">Infrastructure Redefined</span></h1>

    <p>Engineering the technological bedrock for African enterprises with uncompromising digital infrastructure.</p>

    <div class="registry-form">
      <input type="email" placeholder="Enterprise Email" id="email-registry"/>
      <button class="btn-initialize" id="registry-btn">Initialize Access</button>
    </div>

    <div id="status-msg" class="mt-8 text-xs font-bold uppercase tracking-[0.3em] opacity-0 transition-opacity text-bou-green">
      Registry updated. Access protocol initialized.
    </div>
  </main>

  <footer class="footer-mini">
    <span>© 2026 BOUCLOUD</span>
    <div class="w-px h-3 bg-slate-200"></div>
    <span>Built by <a href="https://www.bougroup.org/technology.html" target="_blank">BOU Group</a></span>
  </footer>

  <script>
    class CanvasParticleEngine {
      constructor(canvas, options) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.particles = [];
        this.options = options;
        window.addEventListener('resize', () => this.resize());
        this.resize();
      }
      resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }
      start() {
        for (let i = 0; i < this.options.particleCount; i++) {
          this.particles.push(new Particle(this.canvas, this.options));
        }
        this.animate();
      }
      animate() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.particles.forEach(p => {
          p.update();
          p.draw(this.ctx);
        });
        this.drawNetwork();
        requestAnimationFrame(() => this.animate());
      }
      drawNetwork() {
        for (let i = 0; i < this.particles.length; i++) {
          for (let j = i + 1; j < this.particles.length; j++) {
            const dx = this.particles[i].x - this.particles[j].x;
            const dy = this.particles[i].y - this.particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 180) {
              this.ctx.beginPath();
              this.ctx.strokeStyle = this.options.connectionColor;
              this.ctx.globalAlpha = (1 - dist / 180) * this.options.connectionOpacity;
              this.ctx.lineWidth = 1;
              this.ctx.moveTo(this.particles[i].x, this.particles[i].y);
              this.ctx.lineTo(this.particles[j].x, this.particles[j].y);
              this.ctx.stroke();
              this.ctx.globalAlpha = 1;
            }
          }
        }
      }
    }

    class Particle {
      constructor(canvas, options) {
        this.canvas = canvas;
        this.options = options;
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.radius = Math.random() * 2 + 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > this.canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > this.canvas.height) this.vy *= -1;
      }
      draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.options.particleColor;
        ctx.globalAlpha = this.options.particleOpacity;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('particle-canvas');
      const engine = new CanvasParticleEngine(canvas, {
        particleColor: '#0284C7',
        particleOpacity: 0.4,
        particleCount: 75,
        connectionColor: '#10A500',
        connectionOpacity: 0.12
      });
      engine.start();

      const btn = document.getElementById('registry-btn');
      const input = document.getElementById('email-registry');
      const msg = document.getElementById('status-msg');
      if (btn && input && msg) {
        btn.onclick = () => {
          if (input.value.includes('@')) {
            btn.innerText = 'INITIALIZED';
            btn.style.background = '#10A500';
            msg.style.opacity = '1';
          }
        };
      }
    });
  </script>
</div>
</main>

<script type="module" src="/assets/js/index.js"></script>


</body></html>
