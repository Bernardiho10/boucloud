<div class="boucloud-sovereign-root"
  style="width: 100vw; height: 100vh; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; font-family: 'Outfit', sans-serif;"
  data-ham-page-config='{
      "layout": "default.lhtml",
      "assets": { "css": [], "js": [] }
    }'>
  <style>
    :root {
      --bou-green: #10A500;
      --bou-blue: #2563EB;
      --text-white: #FFFFFF;
      --text-dim: #94A3B8;
      --glass-bg: rgba(15, 23, 42, 0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Forced Visibility Foundation */
    .content-container {
      position: relative;
      z-index: 100;
      width: 100%;
      max-width: 1200px;
      padding: 0 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 1 !important;
      visibility: visible !important;
      margin-top: 2rem;
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes gradient-move {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .animated-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(-45deg, #020617, #1e1b4b, #0c4a6e, #020617);
      background-size: 400% 400%;
      animation: gradient-move 20s ease infinite;
      z-index: 1;
    }

    .hero-glow-aura {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(16, 165, 0, 0.12) 0%, rgba(37, 99, 235, 0.08) 50%, transparent 70%);
      filter: blur(80px);
      z-index: 5;
      pointer-events: none;
    }

    .logo-wrapper {
      position: relative;
      display: inline-block;
    }

    /* Sprinkled Green Brand Glow */
    .logo-wrapper::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140%;
      height: 140%;
      background: radial-gradient(circle, rgba(16, 165, 0, 0.25) 0%, transparent 70%);
      z-index: -1;
      filter: blur(30px);
    }

    .logo-wrapper img {
      height: clamp(80px, 15vw, 190px);

    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.95;
      color: var(--text-white) !important;
      margin-bottom: 1rem;
    }

    .tag-line {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6em;
      color: var(--bou-green);
      margin-bottom: 2rem;
      background: rgba(16, 165, 0, 0.1);
      padding: 0.6rem 2rem;
      border-radius: 999px;
      border: 1px solid rgba(16, 165, 0, 0.3);
    }

    .hero-desc {
      color: var(--text-dim);
      font-size: clamp(1.1rem, 2.5vw, 1.7rem);
      font-weight: 400;
      max-width: 850px;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .gloss-registry {
      width: 100%;
      max-width: 650px;
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
      transition: all 0.4s ease;
    }

    .gloss-registry:focus-within {
      border-color: var(--bou-green);
      transform: translateY(-2px);
    }

    input {
      background: transparent;
      border: none;
      flex: 1;
      padding: 1.25rem 2.5rem;
      color: white;
      font-weight: 500;
      font-size: 1.25rem;
      outline: none;
      width: 100%;
    }

    .btn-init {
      background: var(--text-white);
      color: #020617;
      font-weight: 800;
      padding: 0.5rem 1.5rem;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      white-space: nowrap;
    }

    .btn-init:hover {
      background: var(--bou-green);
      color: white;
      transform: scale(1.03);
    }

    .footer-minimal {
      position: absolute;
      bottom: 0.5rem;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5em;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 2rem;
      z-index: 150;
    }

    .footer-minimal a {
      color: var(--bou-green);
      text-decoration: none;
    }
  </style>

  <div class="animated-bg"></div>
  <div class="hero-glow-aura"></div>
  <canvas id="particle-canvas"></canvas>

  <main class="content-container">
    <div class="logo-wrapper">
      <img src="/assets/img/boucloud_logo_new.png" alt="BouCloud">
    </div>

    <div class="tag-line">Establishing Nodes 2026</div>

    <h1>The Sovereign Cloud <br> <span style="color: var(--bou-blue); opacity: 0.95;">Infrastructure Redefined</span>
    </h1>

    <p class="hero-desc">Engineering the technological bedrock for African enterprises with uncompromising digital
      infrastructure.</p>

    <div class="gloss-registry">
      <input type="email" placeholder="Enterprise Email" id="email-registry"
        style="margin: 0px 8px; border-radius: 5px !important; background-color: unset !important;">
      <button class="btn-init" id="registry-btn">Initialize Access</button>
    </div>

    <div id="status-msg"
      style="margin-top: 2rem; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4em; opacity: 0; transition: opacity 0.5s; color: var(--bou-green);">
      Access protocol initialized.
    </div>
  </main>

  <footer class="footer-minimal">
    <span>© 2026 BOUCLOUD</span>
    <div style="width: 1px; height: 12px; background: rgba(255,255,255,0.1);"></div>
    <span>Built by <a href="https://www.bougroup.org/technology.html" target="_blank">BOU</a></span>
  </footer>

  <script>
    class KineticEngine {
      constructor(canvas, options) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.particles = [];
        this.options = options;
        window.addEventListener('resize', () => this.resize());
        this.resize();
      }
      resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }
      start() {
        for (let i = 0; i < this.options.particleCount; i++) {
          this.particles.push(new PNode(this.canvas, this.options));
        }
        this.animate();
      }
      animate() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.particles.forEach(p => { p.update(); p.draw(this.ctx); });
        this.drawNetwork();
        requestAnimationFrame(() => this.animate());
      }
      drawNetwork() {
        for (let i = 0; i < this.particles.length; i++) {
          for (let j = i + 1; j < this.particles.length; j++) {
            const dx = this.particles[i].x - this.particles[j].x;
            const dy = this.particles[i].y - this.particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 200) {
              this.ctx.beginPath();
              this.ctx.strokeStyle = this.options.connectionColor;
              this.ctx.globalAlpha = (1 - dist / 200) * this.options.connectionOpacity;
              this.ctx.lineWidth = 1.2;
              this.ctx.moveTo(this.particles[i].x, this.particles[i].y);
              this.ctx.lineTo(this.particles[j].x, this.particles[j].y);
              this.ctx.stroke();
            }
          }
        }
      }
    }

    class PNode {
      constructor(canvas, options) {
        this.canvas = canvas;
        this.options = options;
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 2.5 + 1;
        // Sprinkle Green Nodes (70% Green, 30% Blue)
        this.color = Math.random() > 0.3 ? options.primaryColor : options.secondaryColor;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > this.canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > this.canvas.height) this.vy *= -1;
      }
      draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.options.particleOpacity;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('particle-canvas');
      const engine = new KineticEngine(canvas, {
        primaryColor: '#10A500', // Green Node
        secondaryColor: '#2563EB', // Blue Node
        particleOpacity: 0.75,
        particleCount: 90,
        connectionColor: '#10A500',
        connectionOpacity: 0.18
      });
      engine.start();

      const btn = document.getElementById('registry-btn');
      const input = document.getElementById('email-registry');
      const msg = document.getElementById('status-msg');
      if (btn && input && msg) {
        btn.onclick = () => {
          if (input.value.includes('@')) {
            btn.innerText = 'INITIALIZED';
            btn.style.background = '#10A500';
            btn.style.color = '#FFFFFF';
            msg.style.opacity = '1';
            input.value = '';
          }
        };
      }
    });
  </script>
</div>
